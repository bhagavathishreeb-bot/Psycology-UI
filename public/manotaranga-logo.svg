<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="psiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B4E71"/>
      <stop offset="100%" style="stop-color:#8B5A8B"/>
    </linearGradient>
    <linearGradient id="petalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8E8EE;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#E8D4E0;stop-opacity:0.8"/>
    </linearGradient>
  </defs>
  <!-- Lotus petals (outer frame) -->
  <ellipse cx="60" cy="55" rx="42" ry="45" fill="url(#petalGrad)" stroke="#E8C4D4" stroke-width="1.5"/>
  <!-- Psi vertical stem -->
  <line x1="60" y1="12" x2="60" y2="95" stroke="url(#psiGrad)" stroke-width="6" stroke-linecap="round"/>
  <!-- Psi horizontal bar & arms -->
  <path d="M35 38 Q60 28 85 38 Q95 52 88 68 Q60 82 32 68 Q25 52 35 38" fill="none" stroke="url(#psiGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
